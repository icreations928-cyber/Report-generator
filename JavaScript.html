<script>
// ============================================================
//  DIGIFYCE DASHBOARD — FRONTEND JAVASCRIPT
// ============================================================

var currentUser = null;
var clientList  = [];
var currentPage = 'dashboard';

window.onload = function() {
  var saved = sessionStorage.getItem('digifyce_user');
  if (saved) { currentUser = JSON.parse(saved); initApp(); }
};

// ── AUTH ─────────────────────────────────────────────────────
function doLogin() {
  var username = document.getElementById('loginUsername').value.trim();
  var password = document.getElementById('loginPassword').value;
  var btn      = document.getElementById('loginBtn');
  var errEl    = document.getElementById('loginError');
  if (!username || !password) { showLoginError('Please enter username and password'); return; }
  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  errEl.style.display = 'none';
  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled  = false;
      btn.innerHTML = '<span>Sign In</span>';
      if (res.success) {
        currentUser = res.user;
        sessionStorage.setItem('digifyce_user', JSON.stringify(currentUser));
        initApp();
      } else { showLoginError(res.error || 'Login failed'); }
    })
    .withFailureHandler(function(err) {
      btn.disabled  = false;
      btn.innerHTML = '<span>Sign In</span>';
      showLoginError('Server error: ' + err.message);
    })
    .serverLogin(username, password);
}

function showLoginError(msg) {
  var el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}

function doLogout() {
  sessionStorage.removeItem('digifyce_user');
  currentUser = null;
  document.getElementById('mainApp').style.display    = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
}

// ── APP INIT ─────────────────────────────────────────────────
function initApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display     = 'flex';
  document.getElementById('userName').textContent   = currentUser.name;
  document.getElementById('userRole').textContent   = currentUser.role;
  document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
  if (currentUser.role === 'owner') {
    document.querySelectorAll('.owner-only').forEach(function(el) { el.style.display = 'flex'; });
  }
  var now    = new Date();
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var rMon   = now.getMonth() === 0 ? 11 : now.getMonth() - 1;
  var rYear  = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
  document.getElementById('currentMonthChip').textContent = months[rMon] + ' ' + rYear + ' (report month)';
  google.script.run.initSystemSheets();
  loadDashboard();
  if (currentUser.role === 'owner') loadApprovalsBadge();
}

// ── NAVIGATION ───────────────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  var el  = document.getElementById('page-' + page);
  var nav = document.getElementById('nav-' + page);
  if (el)  el.classList.add('active');
  if (nav) nav.classList.add('active');
  currentPage = page;
  var titles = { dashboard:'Dashboard', clients:'Clients', clientform:'Client Form',
    generate:'Generate Report', logs:'Report Logs', users:'Users', approvals:'Pending Approvals', auditlogs:'Audit Logs' };
  document.getElementById('topbarTitle').textContent = titles[page] || page;
  document.getElementById('sidebar').classList.remove('open');
  if (page === 'dashboard') loadDashboard();
  if (page === 'clients')   loadClientsTable();
  if (page === 'generate')  loadGenerateDropdown();
  if (page === 'logs')      loadLogs();
  if (page === 'users')     loadUsersTable();
  if (page === 'approvals') loadApprovals();
  if (page === 'auditlogs') loadAuditLogs();
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

// ── DASHBOARD ────────────────────────────────────────────────
var SOURCE_LABELS = { meta:'Meta', ga4:'GA4', gsc:'GSC', google_ads:'G.Ads', shopify:'Shopify' };
var _dashState = { clients: null, logs: null, connSummary: null };

function loadDashboard() {
  _dashState = { clients: null, logs: null, connSummary: null };
  document.getElementById('attentionPanel').innerHTML = '<div class="loading-state">Checking connections...</div>';
  document.getElementById('activityPanel').innerHTML  = '<div class="loading-state">Loading activity...</div>';

  google.script.run
    .withSuccessHandler(function(clients) {
      if (!Array.isArray(clients)) return;
      clientList = clients;
      _dashState.clients = clients;
      document.getElementById('statClients').textContent = clients.length;
      document.getElementById('statClientsSub').textContent = clients.length + (clients.length === 1 ? ' active client' : ' active clients');
      renderClientCards(clients);
      if (_dashState.connSummary) applyStatusPillsToCards(_dashState.connSummary);
      _maybeRenderAttention();
    })
    .serverGetClients(currentUser.username, currentUser.clients);

  google.script.run
    .withSuccessHandler(function(logs) {
      if (!Array.isArray(logs)) return;
      _dashState.logs = logs;
      renderReportStats(logs);
      renderActivityFeed(logs);
      _maybeRenderAttention();
    })
    .serverGetReportLogs(currentUser.username, currentUser.clients, 200);

  google.script.run
    .withSuccessHandler(function(summary) {
      _dashState.connSummary = (summary && !summary.error) ? summary : {};
      if (_dashState.clients) applyStatusPillsToCards(_dashState.connSummary);
      _maybeRenderAttention();
    })
    .withFailureHandler(function() { _dashState.connSummary = {}; _maybeRenderAttention(); })
    .serverGetConnectionSummary(currentUser.username, currentUser.clients);
}

function renderReportStats(logs) {
  var now = new Date();
  var thisKey = now.getFullYear() + '-' + now.getMonth();
  var lastMonthDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  var lastKey = lastMonthDate.getFullYear() + '-' + lastMonthDate.getMonth();

  var thisMonthLogs = [], lastMonthLogs = [];
  logs.forEach(function(l) {
    if (!l.generated_at) return;
    var d = new Date(l.generated_at);
    if (isNaN(d.getTime())) return;
    var key = d.getFullYear() + '-' + d.getMonth();
    if (key === thisKey) thisMonthLogs.push(l);
    else if (key === lastKey) lastMonthLogs.push(l);
  });

  document.getElementById('statReportsThisMonth').textContent = thisMonthLogs.length;
  var trendEl = document.getElementById('statReportsTrend');
  if (lastMonthLogs.length === 0) {
    trendEl.textContent = thisMonthLogs.length > 0 ? 'vs 0 last month' : ' ';
    trendEl.className = 'stat-trend ' + (thisMonthLogs.length > 0 ? 'up' : 'flat');
  } else {
    var diff = thisMonthLogs.length - lastMonthLogs.length;
    var pct = Math.round((diff / lastMonthLogs.length) * 100);
    trendEl.textContent = (diff >= 0 ? '+' : '') + pct + '% vs last month';
    trendEl.className = 'stat-trend ' + (diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat');
  }

  var successCount = logs.filter(function(l){ return l.status === 'success'; }).length;
  var rate = logs.length ? Math.round((successCount / logs.length) * 100) : null;
  document.getElementById('statSuccessRate').textContent = rate === null ? '--' : rate + '%';
  document.getElementById('statSuccessSub').textContent = logs.length ? (successCount + ' of last ' + logs.length) : 'No reports yet';
  document.getElementById('statSuccessSub').className = 'stat-trend ' + (rate === null ? 'flat' : rate >= 90 ? 'up' : rate < 70 ? 'down' : 'flat');
}

function renderActivityFeed(logs) {
  var el = document.getElementById('activityPanel');
  if (!logs.length) {
    el.innerHTML = '<div class="empty-state" style="padding:32px"><div class="empty-state-text">No activity yet.</div></div>';
    return;
  }
  var html = '';
  logs.slice(0, 10).forEach(function(l) {
    var ok = l.status === 'success';
    html += '<div class="activity-item">'
      + '<div class="activity-icon ' + (ok ? 'success' : 'failed') + '">' + (ok ? '✓' : '!') + '</div>'
      + '<div class="activity-main">'
      + '<div class="activity-text"><b>' + esc(l.client_name) + '</b> report for ' + esc(l.month_label) + ' ' + (ok ? 'generated' : 'failed') + ' by ' + esc(l.generated_by) + '</div>'
      + '<div class="activity-time">' + formatDate(l.generated_at) + '</div>'
      + '</div></div>';
  });
  el.innerHTML = html;
}

function _maybeRenderAttention() {
  if (!_dashState.clients || !_dashState.logs || !_dashState.connSummary) return;
  renderAttentionPanel(_dashState.clients, _dashState.logs, _dashState.connSummary);
}

function renderAttentionPanel(clients, logs, summary) {
  var items = [];

  clients.forEach(function(c) {
    var srcs = summary[c.client_key];
    if (srcs) {
      Object.keys(srcs).forEach(function(src) {
        if (srcs[src].status === 'error') {
          items.push({
            client: c.name, key: c.client_key,
            reason: (SOURCE_LABELS[src] || src) + ': ' + (srcs[src].lastError || 'Connection error'),
            severity: 'error'
          });
        }
      });
    }
    if (!c.sheet_id || String(c.sheet_id).trim() === '') {
      items.push({ client: c.name, key: c.client_key, reason: 'No Google Sheet linked', severity: 'warn' });
    }
  });

  var latestByClient = {};
  logs.forEach(function(l) {
    if (!latestByClient[l.client_key]) latestByClient[l.client_key] = l;
  });
  Object.keys(latestByClient).forEach(function(ck) {
    var l = latestByClient[ck];
    if (l.status === 'failed') {
      items.push({ client: l.client_name, key: ck, reason: 'Last report failed: ' + (l.error_msg ? l.error_msg.slice(0,60) : 'Unknown error'), severity: 'error' });
    }
  });

  document.getElementById('statAttention').textContent = items.length;
  var uniqueClients = {};
  items.forEach(function(i) { uniqueClients[i.key] = true; });
  var clientCount = Object.keys(uniqueClients).length;
  document.getElementById('statAttentionSub').textContent = clientCount ? (clientCount + ' client' + (clientCount === 1 ? '' : 's') + ' affected') : 'All clear';
  document.getElementById('statAttentionCard').className = 'stat-card' + (items.length ? ' accent-danger' : '');

  var el = document.getElementById('attentionPanel');
  if (!items.length) {
    el.innerHTML = '<div class="empty-state" style="padding:32px"><div class="empty-state-text">All connections healthy. Nothing needs attention.</div></div>';
    return;
  }
  items.sort(function(a,b) { return (a.severity === 'error' ? 0 : 1) - (b.severity === 'error' ? 0 : 1); });
  var html = '';
  items.slice(0, 12).forEach(function(i) {
    html += '<div class="attention-item">'
      + '<span class="attention-dot' + (i.severity === 'warn' ? ' warn' : '') + '"></span>'
      + '<div class="attention-main">'
      + '<div class="attention-name">' + esc(i.client) + '</div>'
      + '<div class="attention-reason" title="' + esc(i.reason) + '">' + esc(i.reason) + '</div>'
      + '</div>'
      + '<div class="attention-action"><button class="btn-icon" onclick="editClient(\'' + esc(i.key) + '\')">Fix</button></div>'
      + '</div>';
  });
  el.innerHTML = html;
}

function statusPillHtml(clientKey, source, label) {
  return '<span class="status-pill never" data-client="' + esc(clientKey) + '" data-source="' + source + '"><span class="dot"></span>' + esc(label) + '</span>';
}

function applyStatusPillsToCards(summary) {
  document.querySelectorAll('.status-pill[data-client]').forEach(function(pill) {
    var ck = pill.getAttribute('data-client'), src = pill.getAttribute('data-source');
    var s = summary[ck] && summary[ck][src];
    if (!s) return; // stays 'never'
    pill.classList.remove('never');
    pill.classList.add(s.status === 'ok' ? 'ok' : 'error');
    if (s.status !== 'ok' && s.lastError) pill.title = s.lastError;
    else if (s.lastCheckAt) pill.title = 'Last checked ' + formatDate(s.lastCheckAt);
  });
}

function renderClientCards(clients) {
  var el = document.getElementById('clientCards');
  if (!clients.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9672;</div>'
      + '<div class="empty-state-text">No clients yet. <a href="#" onclick="showPage(\'clients\')">Add your first client</a></div></div>';
    return;
  }
  var html = '';
  clients.forEach(function(c) {
    var hasSheet = c.sheet_id && c.sheet_id.trim() !== '';
    var hasGAds  = c.google_ads_enabled === 'true' || c.google_ads_enabled === true;
    var hasShopify = c.shopify_enabled === 'true' || c.shopify_enabled === true;
    var sheetTag = hasSheet
      ? '<span class="client-tag green">Sheet OK</span>'
      : '<span class="client-tag" style="background:var(--red-light);color:var(--red)">No Sheet</span>';
    var sheetBtn = hasSheet
      ? '<button class="btn btn-ghost sm" onclick="openClientSheet(\'' + esc(c.client_key) + '\')">Open Sheet</button>'
      : '<button class="btn btn-ghost sm" style="border-color:var(--green);color:var(--green)" onclick="createClientSheet(\'' + esc(c.client_key) + '\',\'' + esc(c.name) + '\')">+ Create Sheet</button>';

    var pills = statusPillHtml(c.client_key, 'meta', 'Meta')
      + statusPillHtml(c.client_key, 'ga4', 'GA4')
      + (c.gsc_site_url ? statusPillHtml(c.client_key, 'gsc', 'GSC') : '')
      + (hasGAds ? statusPillHtml(c.client_key, 'google_ads', 'G.Ads') : '')
      + (hasShopify ? statusPillHtml(c.client_key, 'shopify', 'Shopify') : '');

    html += '<div class="client-card">'
      + '<div class="client-card-name">' + esc(c.name) + '</div>'
      + '<div class="client-card-key">' + esc(c.client_key) + '</div>'
      + '<div class="client-card-meta">' + pills + sheetTag + '</div>'
      + '<div class="client-card-actions" style="flex-wrap:wrap;gap:6px">'
      + '<button class="btn btn-primary sm" onclick="quickGenerate(\'' + esc(c.client_key) + '\',\'' + esc(c.name) + '\')">Generate</button>'
      + sheetBtn
      + '<button class="btn btn-ghost sm" onclick="editClient(\'' + esc(c.client_key) + '\')">Edit</button>'
      + '<button class="btn btn-ghost sm" style="border-color:var(--muted);color:var(--muted)" onclick="viewClientHistory(\'' + esc(c.client_key) + '\',\'' + esc(c.name) + '\')">History</button>'
      + '</div></div>';
  });
  el.innerHTML = html;

  // Clear search on load
  var df = document.getElementById('dashboardSearch');
  if (df) df.value = '';
}

function quickGenerate(clientKey, clientName) {
  showPage('generate');
  setTimeout(function() { var s = document.getElementById('gen_client'); if (s) s.value = clientKey; }, 150);
}

// ── CLIENTS TABLE ────────────────────────────────────────────
function loadClientsTable() {
  var el = document.getElementById('clientsTable');
  el.innerHTML = '<div class="loading-state">Loading...</div>';
  google.script.run
    .withSuccessHandler(function(clients) {
      if (!Array.isArray(clients)) { el.innerHTML = '<div class="loading-state">Error loading clients</div>'; return; }
      clientList = clients;
      if (!clients.length) { el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9672;</div><div class="empty-state-text">No clients yet.</div></div>'; return; }
      var rows = '';
      clients.forEach(function(c) {
        var hasSheet = c.sheet_id && c.sheet_id.trim() !== '';
        var hasGAds  = c.google_ads_enabled === 'true' || c.google_ads_enabled === true;
        var hasShopify = c.shopify_enabled === 'true' || c.shopify_enabled === true;
        var sheetBtn = hasSheet
          ? '<button class="btn-icon" onclick="openClientSheet(\'' + esc(c.client_key) + '\')">Open Sheet</button>'
          : '<button class="btn-icon" style="color:var(--green);border-color:var(--green)" onclick="createClientSheet(\'' + esc(c.client_key) + '\',\'' + esc(c.name) + '\')">+ Create Sheet</button>';
        var delBtn = currentUser.role === 'owner'
          ? '<button class="btn-icon" style="color:var(--red)" onclick="deleteClient(\'' + esc(c.client_key) + '\',\'' + esc(c.name) + '\')">X</button>' : '';
        var pills = statusPillHtml(c.client_key, 'meta', 'Meta')
          + statusPillHtml(c.client_key, 'ga4', 'GA4')
          + (c.gsc_site_url ? statusPillHtml(c.client_key, 'gsc', 'GSC') : '')
          + (hasGAds ? statusPillHtml(c.client_key, 'google_ads', 'G.Ads') : '')
          + (hasShopify ? statusPillHtml(c.client_key, 'shopify', 'Shopify') : '');
        rows += '<tr>'
          + '<td class="code-cell">' + esc(c.client_key) + '</td>'
          + '<td><strong>' + esc(c.name) + '</strong></td>'
          + '<td>' + esc(c.agent_email) + '</td>'
          + '<td><div style="display:flex;gap:4px;flex-wrap:wrap">' + pills + '</div></td>'
          + '<td><span class="status-badge ' + (hasSheet ? 'success' : 'failed') + '">' + (hasSheet ? 'Linked' : 'No Sheet') + '</span></td>'
          + '<td><div style="display:flex;gap:6px;flex-wrap:wrap">' + sheetBtn
          + '<button class="btn-icon" onclick="editClient(\'' + esc(c.client_key) + '\')">Edit</button>'
          + '<button class="btn-icon" onclick="quickGenerate(\'' + esc(c.client_key) + '\',\'' + esc(c.name) + '\')">Run</button>'
          + '<button class="btn-icon" onclick="viewClientHistory(\'' + esc(c.client_key) + '\',\'' + esc(c.name) + '\')">History</button>'
          + delBtn + '</div></td></tr>';
      });
      el.innerHTML = '<table><thead><tr><th>Key</th><th>Brand</th><th>Agent</th><th>Connections</th><th>Sheet</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table>';
      google.script.run
        .withSuccessHandler(function(summary) { if (summary && !summary.error) applyStatusPillsToCards(summary); })
        .serverGetConnectionSummary(currentUser.username, currentUser.clients);

      // Clear filters on load
      var sf = document.getElementById('clientSearch');
      if (sf) sf.value = '';
    })
    .serverGetClients(currentUser.username, currentUser.clients);
}

// ── CLIENT FORM ──────────────────────────────────────────────
function showAddClient() {
  document.getElementById('clientFormTitle').textContent = 'Add Client';
  document.getElementById('clientFormBtn').textContent   = 'Save Client';
  document.getElementById('editMode').value      = 'add';
  document.getElementById('editClientKey').value  = '';
  document.getElementById('fc_client_key').disabled = false;
  clearClientForm();
  resetTestResults();
  document.getElementById('testAllWrap').style.display = 'none';
  showPage('clientform');
}

function editClient(clientKey) {
  showLoadingOverlay('Loading client configuration...');
  document.getElementById('clientFormTitle').textContent = 'Edit Client';
  document.getElementById('clientFormBtn').textContent   = currentUser.role === 'owner' ? 'Save Changes' : 'Request Edit';
  document.getElementById('editMode').value      = 'edit';
  document.getElementById('editClientKey').value  = clientKey;
  document.getElementById('fc_client_key').disabled = true;
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoadingOverlay();
      if (!res.success) { showFlash('error', res.error); return; }
      var c = res.client;
      document.getElementById('fc_client_key').value             = c.client_key;
      document.getElementById('fc_name').value                   = c.name;
      document.getElementById('fc_agent_email').value            = c.agent_email;
      document.getElementById('fc_client_logo_id').value         = c.client_logo_id || '';
      document.getElementById('fc_sheet_id').value               = c.sheet_id || '';
      document.getElementById('fc_meta_access_token').value      = c.meta_access_token;
      document.getElementById('fc_meta_ad_account_ids').value    = c.meta_ad_account_ids;
      document.getElementById('fc_ga4_property_id').value        = c.ga4_property_id;
      document.getElementById('fc_gsc_site_url').value           = c.gsc_site_url;
      document.getElementById('fc_google_ads_enabled').value     = String(c.google_ads_enabled);
      document.getElementById('fc_google_ads_dev_token').value   = c.google_ads_dev_token || '';
      document.getElementById('fc_google_ads_customer_id').value = c.google_ads_customer_id || '';
      document.getElementById('fc_google_ads_mcc_id').value      = c.google_ads_mcc_id || '';
      document.getElementById('fc_shopify_enabled').value        = String(c.shopify_enabled);
      document.getElementById('fc_shopify_access_token').value   = c.shopify_access_token || '';
      document.getElementById('fc_shopify_shop_name').value      = c.shopify_shop_name || '';
      resetTestResults();
      document.getElementById('testAllWrap').style.display = 'block';
      showPage('clientform');
    })
    .withFailureHandler(function(err) { hideLoadingOverlay(); showFlash('error', err.message); })
    .serverGetClientFull(clientKey);
}

// ── CONNECTION TESTING (client form) ────────────────────────
function resetTestResults() {
  Object.keys(SOURCE_LABELS).forEach(function(src) {
    var r = document.getElementById('testResult_' + src);
    if (r) { r.textContent = ''; r.className = 'test-conn-result'; }
    var b = document.getElementById('testBtn_' + src);
    if (b) { b.disabled = false; b.textContent = 'Test Connection'; }
  });
}

function testConnection(source) {
  var clientKey = document.getElementById('editClientKey').value;
  var resultEl = document.getElementById('testResult_' + source);
  var btn = document.getElementById('testBtn_' + source);
  if (!clientKey) {
    resultEl.className = 'test-conn-result error';
    resultEl.textContent = 'Save this client first, then test the connection.';
    return;
  }
  var fnMap = {
    meta: 'serverTestMetaConnection',
    ga4: 'serverTestGA4Connection',
    gsc: 'serverTestGSCConnection',
    google_ads: 'serverTestGoogleAdsConnection',
    shopify: 'serverTestShopifyConnection'
  };
  btn.disabled = true; btn.textContent = 'Testing...';
  resultEl.className = 'test-conn-result';
  resultEl.textContent = '';
  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false; btn.textContent = 'Test Connection';
      resultEl.className = 'test-conn-result ' + (res.success ? 'ok' : 'error');
      resultEl.textContent = res.success ? (res.message || 'Connected') : res.error;
    })
    .withFailureHandler(function(err) {
      btn.disabled = false; btn.textContent = 'Test Connection';
      resultEl.className = 'test-conn-result error';
      resultEl.textContent = 'Error: ' + err.message;
    })
    [fnMap[source]](clientKey);
}

function testAllConnections() {
  var clientKey = document.getElementById('editClientKey').value;
  if (!clientKey) { showFlash('error', 'Save this client first, then test connections.'); return; }
  var allBtn = document.getElementById('testAllBtn');
  allBtn.disabled = true; allBtn.textContent = 'Testing all...';
  Object.keys(SOURCE_LABELS).forEach(function(src) {
    var b = document.getElementById('testBtn_' + src);
    if (b) { b.disabled = true; b.textContent = 'Testing...'; }
  });
  google.script.run
    .withSuccessHandler(function(results) {
      allBtn.disabled = false; allBtn.textContent = 'Test All Connections';
      Object.keys(results).forEach(function(src) {
        var res = results[src];
        var resultEl = document.getElementById('testResult_' + src);
        var btn = document.getElementById('testBtn_' + src);
        if (btn) { btn.disabled = false; btn.textContent = 'Test Connection'; }
        if (resultEl) {
          resultEl.className = 'test-conn-result ' + (res.success ? 'ok' : 'error');
          resultEl.textContent = res.success ? (res.message || 'Connected') : res.error;
        }
      });
    })
    .withFailureHandler(function(err) {
      allBtn.disabled = false; allBtn.textContent = 'Test All Connections';
      resetTestResults();
      showFlash('error', 'Error: ' + err.message);
    })
    .serverTestAllConnections(clientKey);
}

function clearClientForm() {
  ['fc_client_key','fc_name','fc_agent_email','fc_client_logo_id','fc_sheet_id',
   'fc_meta_access_token','fc_meta_ad_account_ids','fc_ga4_property_id',
   'fc_gsc_site_url','fc_google_ads_dev_token','fc_google_ads_customer_id','fc_google_ads_mcc_id',
   'fc_shopify_access_token','fc_shopify_shop_name']
    .forEach(function(id) { document.getElementById(id).value = ''; });

  document.getElementById('fc_shopify_enabled').value = 'false';

function submitClientForm() {
  var mode = document.getElementById('editMode').value;
  var btn  = document.getElementById('clientFormBtn');
  var data = {
    client_key:             document.getElementById('fc_client_key').value.trim().replace(/\s+/g,''),
    name:                   document.getElementById('fc_name').value.trim(),
    agent_email:            document.getElementById('fc_agent_email').value.trim(),
    client_logo_id:         document.getElementById('fc_client_logo_id').value.trim(),
    sheet_id:               document.getElementById('fc_sheet_id').value.trim(),
    meta_access_token:      document.getElementById('fc_meta_access_token').value.trim(),
    meta_ad_account_ids:    document.getElementById('fc_meta_ad_account_ids').value.trim(),
    ga4_property_id:        document.getElementById('fc_ga4_property_id').value.trim(),
    gsc_site_url:           document.getElementById('fc_gsc_site_url').value.trim(),
    google_ads_enabled:     document.getElementById('fc_google_ads_enabled').value === 'true',
    google_ads_dev_token:   document.getElementById('fc_google_ads_dev_token').value.trim(),
    google_ads_customer_id: document.getElementById('fc_google_ads_customer_id').value.trim(),
    google_ads_mcc_id:      document.getElementById('fc_google_ads_mcc_id').value.trim(),
    shopify_enabled:        document.getElementById('fc_shopify_enabled').value === 'true',
    shopify_access_token:   document.getElementById('fc_shopify_access_token').value.trim(),
    shopify_shop_name:      document.getElementById('fc_shopify_shop_name').value.trim(),
  };
  
  // Validations
  var required = ['client_key','name','agent_email','meta_access_token','meta_ad_account_ids','ga4_property_id','gsc_site_url'];
  for (var i = 0; i < required.length; i++) {
    if (!data[required[i]]) { showFlash('error', 'Please fill in all required fields (marked with *)'); return; }
  }
  
  if (data.google_ads_enabled) {
    if (!data.google_ads_dev_token || !data.google_ads_customer_id) {
      showFlash('error', 'Google Ads is enabled. Developer Token and Customer ID are required.');
      return;
    }
  }
  if (data.shopify_enabled) {
    if (!data.shopify_access_token || !data.shopify_shop_name) {
      showFlash('error', 'Shopify is enabled. Access Token and Shop subdomain are required.');
      return;
    }
  }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  if (mode === 'add') {
    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false; btn.textContent = 'Save Client';
        if (res.success) { showFlash('success', 'Client added! Now click Create Sheet to set up their data sheet.'); showPage('clients'); }
        else showFlash('error', res.error);
      })
      .serverSaveClient(data, currentUser.username);
  } else {
    var changes = {};
    Object.keys(data).forEach(function(k) { if (k !== 'client_key') changes[k] = data[k]; });
    if (currentUser.role === 'owner') {
      google.script.run
        .withSuccessHandler(function(reqRes) {
          if (!reqRes.success) { btn.disabled = false; btn.textContent = 'Save Changes'; showFlash('error', reqRes.error); return; }
          google.script.run
            .withSuccessHandler(function(appRes) {
              btn.disabled = false; btn.textContent = 'Save Changes';
              if (appRes.success) { showFlash('success', 'Client updated!'); showPage('clients'); }
              else showFlash('error', appRes.error);
            })
            .serverApproveEdit(reqRes.requestId, currentUser.username);
        })
        .serverRequestClientEdit(data.client_key, changes, currentUser.username);
    } else {
      google.script.run
        .withSuccessHandler(function(res) {
          btn.disabled = false; btn.textContent = 'Request Edit';
          if (res.success) { showFlash('success', 'Edit request submitted! Awaiting owner approval.'); showPage('clients'); }
          else showFlash('error', res.error);
        })
        .serverRequestClientEdit(data.client_key, changes, currentUser.username);
    }
  }
}

// ── FILTER FUNCTIONS ─────────────────────────────────────────
function filterDashboardCards() {
  var query = document.getElementById('dashboardSearch').value.toLowerCase().trim();
  var cards = document.querySelectorAll('#clientCards .client-card');
  var matchCount = 0;
  cards.forEach(function(card) {
    var name = card.querySelector('.client-card-name').textContent.toLowerCase();
    var key = card.querySelector('.client-card-key').textContent.toLowerCase();
    if (name.indexOf(query) > -1 || key.indexOf(query) > -1) {
      card.style.display = 'block';
      matchCount++;
    } else {
      card.style.display = 'none';
    }
  });
  // Adjust empty state if all cards are hidden
  var grid = document.getElementById('clientCards');
  var empty = grid.querySelector('.empty-search-state');
  if (matchCount === 0 && cards.length > 0) {
    if (!empty) {
      var div = document.createElement('div');
      div.className = 'empty-search-state empty-state';
      div.style.padding = '30px';
      div.innerHTML = '<div class="empty-state-text">No matching clients found.</div>';
      grid.appendChild(div);
    }
  } else if (empty) {
    empty.remove();
  }
}

function filterClientsTable() {
  var query = document.getElementById('clientSearch').value.toLowerCase().trim();
  var rows = document.querySelectorAll('#clientsTable tbody tr');
  rows.forEach(function(row) {
    var text = row.textContent.toLowerCase();
    row.style.display = text.indexOf(query) > -1 ? '' : 'none';
  });
}

function filterLogsTable() {
  var clientQuery = document.getElementById('logClientSearch').value.toLowerCase().trim();
  var statusQuery = document.getElementById('logStatusFilter').value.toLowerCase().trim();
  var userQuery = document.getElementById('logUserSearch').value.toLowerCase().trim();
  
  var rows = document.querySelectorAll('#logsTable tbody tr');
  rows.forEach(function(row) {
    var cells = row.getElementsByTagName('td');
    if (cells.length < 5) return;
    var clientText = cells[0].textContent.toLowerCase();
    var statusText = cells[2].textContent.toLowerCase().trim();
    var userText = cells[3].textContent.toLowerCase();
    
    var matchesClient = clientText.indexOf(clientQuery) > -1;
    var matchesStatus = statusQuery === 'all' || statusText === statusQuery;
    var matchesUser = userText.indexOf(userQuery) > -1;
    
    row.style.display = (matchesClient && matchesStatus && matchesUser) ? '' : 'none';
  });
}

function filterAuditLogs() {
  var query = document.getElementById('auditSearch').value.toLowerCase().trim();
  var rows = document.querySelectorAll('#auditLogsTable tbody tr');
  rows.forEach(function(row) {

function generateReport() {
  var clientKey = document.getElementById('gen_client').value;
  var mode      = document.getElementById('gen_mode').value;
  var monthRaw  = document.getElementById('gen_month').value;
  var btn       = document.getElementById('genBtn');
  if (!clientKey) { showFlash('error', 'Please select a client'); return; }
  if (mode === 'manual' && !monthRaw) { showFlash('error', 'Please pick a month'); return; }
  var monthStr = '';
  if (mode === 'manual' && monthRaw) {
    var parts = monthRaw.split('-');
    var names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    monthStr  = names[parseInt(parts[1])-1] + ' ' + parts[0];
  }
  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  showLoadingOverlay('Generating marketing report for ' + clientKey + '... This connects to GA4, Ads, Shopify, and GPT-4o to draw slides. (takes 1-2 mins)');
  var resultsEl = document.getElementById('genResults');
  var innerEl   = document.getElementById('genResultsInner');
  resultsEl.style.display = 'none';

  function onFail(err) {
    btn.disabled = false; btn.innerHTML = 'Generate Report';
    hideLoadingOverlay();
    showFlash('error', 'Error: ' + err.message);
  }

  if (clientKey === 'ALL') {
    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false; btn.innerHTML = 'Generate Report';
        hideLoadingOverlay();
        resultsEl.style.display = 'block';
        if (!res.success) { innerEl.innerHTML = '<div class="alert alert-error">' + esc(res.error) + '</div>'; return; }
        var html = '';
        res.results.forEach(function(r) {
          html += '<div class="result-item ' + (r.success ? 'success' : 'failed') + '">'
            + '<div class="result-name">' + esc(r.client) + '</div>';
          if (r.success) {
            html += '<div class="result-links">'
              + '<a class="result-link" href="' + r.slideUrl + '" target="_blank">Open Slides</a>'
              + '<a class="result-link pptx" href="' + r.pptxUrl + '" target="_blank">Download PPTX</a>'
              + '</div>';
          } else { html += '<div class="result-error">Failed: ' + esc(r.error) + '</div>'; }
          html += '</div>';
        });
        innerEl.innerHTML = html;
      })
      .withFailureHandler(onFail)
      .serverGenerateAllReports(monthStr, currentUser.username, currentUser.clients);
  } else {
    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false; btn.innerHTML = 'Generate Report';
        hideLoadingOverlay();
        resultsEl.style.display = 'block';
        if (!res.success) { innerEl.innerHTML = '<div class="alert alert-error">' + esc(res.error) + '</div>'; return; }
        innerEl.innerHTML = '<div class="result-item success">'
          + '<div class="result-name">Report ready - ' + esc(res.month) + '</div>'
          + '<div class="result-links">'
          + '<a class="result-link" href="' + res.slideUrl + '" target="_blank">Open in Google Slides</a>'
          + '<a class="result-link pptx" href="' + res.pptxUrl + '" target="_blank">Download as PPTX</a>'
          + '</div></div>';
        loadApprovalsBadge();
      })
      .withFailureHandler(onFail)
      .serverGenerateReport(clientKey, monthStr, currentUser.username, currentUser.clients);
  }
}

      else showFlash('error', res.error);
    })
    .serverRejectEdit(requestId, currentUser.username);
}

// ── UTILITIES ────────────────────────────────────────────────
function showFlash(type, msg) {
  var el = document.getElementById('flashMsg');
  el.className = 'flash-msg alert alert-' + type;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 5000);
}

function togglePwd(inputId, btn) {
  var inp = document.getElementById(inputId);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'Hide'; }
  else { inp.type = 'password'; btn.textContent = 'Show'; }
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function formatDate(str) {
  if (!str) return '-';
  try {
    var d = new Date(str);
    return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })
      + ' ' + d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  } catch(e) { return str; }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') { doLogin(); }
});
</script>
